<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harari Quiz - 21 Bài Học</title>
    <!-- Font & Thư viện chụp ảnh -->
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Màn hình Intro -->
      <div id="screen-intro" class="screen active">
        <h1>Bạn sẽ là ai trong tương lai?</h1>
        <p>Dựa trên 21 Bài Học Cho Thế Kỷ 21 — Yuval Noah Harari</p>
        <button class="btn" id="start-btn">Bắt đầu ngay →</button>
      </div>

      <!-- Màn hình Quiz -->
      <div id="screen-quiz" class="screen">
        <div class="progress-text" id="progress-text">Câu 1/5</div>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
      </div>

      <!-- Màn hình Loading (MỚI THÊM) -->
      <div id="screen-loading" class="screen">
        <div class="loading-dots">
          <span class="dot">•</span><span class="dot">•</span
          ><span class="dot">•</span>
        </div>
        <h2 style="color: var(--accent-gold)">Đang phân tích...</h2>
        <p>Hệ thống đang tìm bài học phù hợp nhất với bạn</p>
      </div>

      <!-- Màn hình Kết quả (ĐÃ CẬP NHẬT) -->
      <div id="screen-result" class="screen">
        <div id="result-card">
          <div class="emoji-large" id="res-emoji"></div>
          <h2 id="res-title"></h2>
          <p id="res-desc"></p>
          <div
            class="quote"
            id="res-quote"
            style="
              font-style: italic;
              color: var(--accent-gold);
              margin: 15px 0;
            "
          ></div>
          <p
            id="res-advice"
            style="font-weight: bold; margin-top: 15px; color: #fff"
          ></p>
        </div>

        <!-- Các nút CTA mới -->
        <button class="btn" id="share-btn">🔗 Chia sẻ kết quả</button>
        <button class="btn btn-outline" id="download-btn">
          📸 Tải Ảnh Kết Quả
        </button>
        <button
          class="btn btn-outline"
          onclick="location.reload()"
          style="border: none; text-decoration: underline"
        >
          ↺ Làm lại từ đầu
        </button>
      </div>
    </div>

    <!-- Nạp các file JS theo đúng thứ tự -->
    <script src="data/questions.js"></script>
    <script src="data/lessons.js"></script>
    <script src="quiz.js"></script>
    <!-- Nếu file share.js trống hoặc gây lỗi thì bạn có thể xóa tạm dòng này đi vì code share đã tích hợp trong app.js rồi -->
    <script src="share.js"></script>
    <script src="app.js"></script>
  </body>
</html>
